// fetchPrices: lightweight price check using Claude web_search
// Returns price + day change for a list of tickers.
// Results are cached in sessionStorage for 10 min to save API calls.
const PRICE_CACHE_KEY="ai_hub_price_cache";
function getPriceCache(){try{const c=JSON.parse(sessionStorage.getItem(PRICE_CACHE_KEY)||"{}");const now=Date.now();return Object.fromEntries(Object.entries(c).filter(([,v])=>now-v.ts<600000));}catch{return{};}}
function setPriceCache(data){try{const existing=getPriceCache();sessionStorage.setItem(PRICE_CACHE_KEY,JSON.stringify({...existing,...data}));}catch{}}

async function fetchPrices(tickers){
  const cache=getPriceCache();
  const needed=tickers.filter(t=>!cache[t]);
  const out={...Object.fromEntries(tickers.filter(t=>cache[t]).map(t=>[t,cache[t]]))};
  if(needed.length===0)return out;
  // Batch up to 8 tickers per Claude call to stay efficient
  const batches=[];
  for(let i=0;i<needed.length;i+=8)batches.push(needed.slice(i,i+8));
  await Promise.all(batches.map(async batch=>{
    try{
      const prompt=`Current price and day % change for: ${batch.join(", ")}. JSON only: {"TICKER":{"price":0.00,"pct":0.00}}`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",signal:AbortSignal.timeout(30000),headers:{"Content-Type":"application/json","x-api-key":getAK(),"anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01","anthropic-beta":"web-search-2025-03-05"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          system:"You are a financial data assistant. Return only valid JSON. No markdown fences, no explanation.",
          messages:[{role:"user",content:prompt}]})});
      const d=await r.json();
      if(d.error)throw new Error(d.error.message);
      const text=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
      const parsed=safeJSON(text);
      if(!parsed)throw new Error("parse");
      const toCache={};
      Object.entries(parsed).forEach(([t,v])=>{
        if(v&&v.price){
          out[t]={price:v.price,pct:v.pct||0,spark:[]};
          toCache[t]={price:v.price,pct:v.pct||0,spark:[],ts:Date.now()};
        }
      });
      setPriceCache(toCache);
    }catch{}
  }));
  return out;
}

async function claude(prompt,sys){
  if(!navigator.onLine)throw new Error("No internet connection. Check your network and try again.");
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    signal:AbortSignal.timeout(30000),
    headers:{"Content-Type":"application/json","x-api-key":getAK(),"anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,
      system:sys||"You are a sharp equity analyst specializing in AI stocks. Be concise and data-driven. No markdown, no asterisks.",
      messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  if(d.error){
    const msg=d.error.message||"API error";
    if(msg.includes("rate limit")||d.error.type==="rate_limit_error")
      throw new Error("Rate limit hit. Wait 60 seconds then try again.");
    if(d.error.type==="authentication_error")
      throw new Error("Invalid API key. Tap ⚙️ to update.");
    throw new Error(msg);
  }
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}


function safeJSON(raw){
  if(!raw)return null;
  let s=raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try{return JSON.parse(s);}catch{}
  const start=s.indexOf("{"),end=s.lastIndexOf("}");
  if(start!==-1&&end>start){try{return JSON.parse(s.slice(start,end+1));}catch{}}
  return null;
}
// ── PROBABILITY ENGINE (pure math, zero API cost) ────────────────────────
// Derives win probability + bear/base/bull returns from stock metadata.
// Based on: growth rating, stage, market cap, source conviction, sector.
function calcStockProb(stock, sectorId){
  // Base win probability by growth rating
  const grBase={"Very High":58,"High":53,"Medium-High":47,"Medium":42};
  let prob=grBase[stock.gr]||45;

  // Stage adjustment — established companies have more predictable outcomes
  const stAdj={Established:+8,Growing:+2,Early:-5};
  prob+=(stAdj[stock.st]||0);

  // Market cap — mega caps have more analyst coverage = more predictable
  const caAdj={Mega:+7,Large:+4,Mid:+1,Small:-3};
  prob+=(caAdj[stock.ca]||0);

  // Source conviction — picked by Wedbush/Dan Ives/Cathie Wood = higher conviction
  const highConvSrc=["Wedbush","Dan Ives","Cathie Wood","Goldman Sachs","JPMorgan"];
  const convBonus=stock.src?.filter(s=>highConvSrc.includes(s)).length||0;
  prob+=convBonus*4;

  // Reddit/Motley Fool adds momentum signal but not fundamental signal
  const momSrc=["Reddit","Motley Fool"];
  const momBonus=stock.src?.filter(s=>momSrc.includes(s)).length||0;
  prob+=momBonus*2;

  // Space sector: SpaceX IPO catalyst this week — boost speculative names
  if(sectorId==="space") prob+=5;

  // VC backing = institutional validation of early-stage companies
  if(stock.vc&&stock.vc.length>10&&stock.st==="Early") prob+=4;

  // Clamp
  prob=Math.max(25,Math.min(82,prob));

  // Bear/Base/Bull returns — derived from volatility profile
  const volatility={Mega:0.12,Large:0.18,Mid:0.28,Small:0.42};
  const vol=volatility[stock.ca]||0.25;
  const growthMult={"Very High":1.8,High:1.4,"Medium-High":1.1,Medium:0.9};
  const gm=growthMult[stock.gr]||1.0;

  const bear=-(vol*0.9*100).toFixed(0);
  const base=(vol*gm*0.7*100).toFixed(0);
  const bull=(vol*gm*1.6*100).toFixed(0);

  return{prob,bear:parseInt(bear),base:parseInt(base),bull:parseInt(bull)};
}

  const scan=()=>{
    const candidates=allStocks.map(stock=>{
      let squeezeScore=0;
      const factors=[];
      // Small float + high beta names are most squeezable
      if(stock.ca==="Small"){squeezeScore+=30;factors.push("Small float — easier to squeeze");}
      if(stock.ca==="Mid"){squeezeScore+=15;factors.push("Mid cap — moderate squeeze potential");}
      // Reddit attention = retail army ready to pile in
      if(stock.src?.includes("Reddit")){squeezeScore+=25;factors.push("Reddit community following — retail catalyst ready");}
      // Very High growth + Early stage = high short interest likely (shorts betting it fails)
      if(stock.gr==="Very High"&&stock.st==="Early"){squeezeScore+=20;factors.push("Very High growth Early-stage — likely heavily shorted");}
      // Space sector specifically noted for high short interest post-pullback

async function alpacaFetch(path,method="GET",body=null){
  const k=getALK(),s=getALS();
  if(!k||!s)throw new Error("Alpaca keys not set. Tap Setup to add them.");
  const opts={method,headers:{"APCA-API-KEY-ID":k,"APCA-API-SECRET-KEY":s,"Content-Type":"application/json"},signal:AbortSignal.timeout(15000)};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(ALPACA_BASE+path,opts);
  if(!r.ok){
    const err=await r.json().catch(()=>({}));
    throw new Error(err.message||`Alpaca error ${r.status}`);
  }
  return r.status===204?{}:await r.json();
}

  const [tradeLimitPx,setTradeLimitPx]=useState("");
  const [tradeStop,setTradeStop]=useState("");

  const showMsg=(text,color=C.gr,duration=4000)=>{
    setMsg({text,color});
    setTimeout(()=>setMsg(null),duration);
  };

  const saveKeys=async()=>{
    if(!keyInp.trim()||!secInp.trim()){showMsg("Both fields required",C.re);return;}
    setLoading(true);
    try{
      localStorage.setItem(ALPACA_KEY_STORE,keyInp.trim());
      localStorage.setItem(ALPACA_SECRET_STORE,secInp.trim());
      const acct=await alpacaFetch("/v2/account");

        alpacaFetch("/v2/positions"),

    if(tradeType==="limit"&&!tradeLimitPx){showMsg("Limit price required",C.re);return;}
    // Hard safety guards — always present
    const qty=parseFloat(tradeQty);

    const body={symbol:sym,qty:tradeQty,side:tradeSide,type:tradeType,time_in_force:"day"};
    if(tradeType==="limit")body.limit_price=tradeLimitPx;
    if(tradeType==="stop_limit"){body.limit_price=tradeLimitPx;body.stop_price=tradeStop;}

function KeySetup({onSave}){
  const [key,setKey]=useState("");
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState("");
  const save=async()=>{
    const k=key.trim();
    if(!k.startsWith("sk-ant-")){setErr("That doesn't look like an Anthropic key — it should start with sk-ant-");return;}
    setTesting(true);setErr("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        signal:AbortSignal.timeout(15000),
        headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:10,messages:[{role:"user",content:"Hi"}]})});
      if(r.status===200||r.status===400){setAK(k);onSave();}
      else if(r.status===401){setErr("Invalid API key — double check you copied the full key from console.anthropic.com");}
      else{setErr(`Unexpected error (${r.status}) — try again`);}
    }catch(e){setErr("Connection failed — make sure you're on a real hosted URL (github.io), not a local file");}
    setTesting(false);
  };
  return React.createElement("div",{style:{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,padding:20}},
    React.createElement("div",{style:{maxWidth:340,width:"100%"}},
      React.createElement("div",{style:{fontSize:9,color:C.mu,letterSpacing:3,textTransform:"uppercase",marginBottom:8}},"ONE-TIME SETUP"),
      React.createElement("h2",{style:{fontFamily:"Georgia,serif",fontSize:20,color:C.ac,marginBottom:10,letterSpacing:-0.5}},"Connect Your Anthropic Key"),
      React.createElement("p",{style:{fontSize:12,color:C.di,lineHeight:1.7,marginBottom:18}},"The AI Analyst, Journal coaching, Position Sizer, and live prices all run on Claude. You need a free Anthropic API key — your key stays in your browser only, never sent anywhere else."),
      React.createElement("div",{style:{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:14,marginBottom:12}},
        React.createElement("div",{style:{fontSize:10,color:C.go,fontWeight:700,marginBottom:8}},"Step 1 — Get your key"),
        React.createElement("p",{style:{fontSize:11,color:C.di,lineHeight:1.6,margin:"0 0 8px"}},"Go to:"),
        React.createElement("div",{style:{background:C.bg,border:`1px solid ${C.ac}30`,borderRadius:6,padding:"7px 12px",fontSize:12,color:C.ac,textAlign:"center",marginBottom:8,letterSpacing:0.5}},"console.anthropic.com"),
        React.createElement("p",{style:{fontSize:11,color:C.di,lineHeight:1.6,margin:0}},"Sign in → API Keys → Create Key → Copy it.")
      ),
      React.createElement("div",{style:{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:14,marginBottom:14}},
        React.createElement("div",{style:{fontSize:10,color:C.go,fontWeight:700,marginBottom:8}},"Step 2 — Paste it here"),
        React.createElement(Inp,{value:key,onChange:setKey,placeholder:"sk-ant-api03-...",style:{width:"100%",boxSizing:"border-box",fontSize:11}}),
        err&&React.createElement("div",{style:{color:C.re,fontSize:10,marginTop:6,lineHeight:1.5}},err)
      ),
      React.createElement(Btn,{onClick:save,disabled:testing||!key.trim(),full:true,color:C.ac},testing?"Verifying…":"Save Key & Launch →"),
      React.createElement("p",{style:{fontSize:9,color:C.mu,textAlign:"center",marginTop:12,lineHeight:1.6}},"Key saved in your browser's local storage only. ~$0.01 per analysis. You control your own usage at console.anthropic.com")
    )
  );
}

        page==="guide"?`10 sectors · ${totalStocks} stocks · Live prices · Watchlist`:"Analyst · Size · Options · Checklist · Journal · Paper Trade · Powered by Claude"
      )
    ),
    React.createElement("div",{style:{flex:1,minHeight:0,display:"flex",flexDirection:"column"}},
      page==="guide"&&React.createElement(Guide,{wl,setWl,prices,setPrices,goToolkit:()=>setPage("toolkit"),notifications,setNotifications}),
      page==="toolkit"&&React.createElement(Toolkit,{wl})
    ),
    React.createElement("div",{style:{borderTop:`1px solid ${C.b}`,padding:"5px 14px",background:C.s1,flexShrink:0}},
      React.createElement("p",{style:{textAlign:"center",fontSize:9,color:C.mu,margin:0}},"Research only · Not financial advice · Options involve substantial risk of loss")
    )

}
