// ═══════════ API ════════════════════════════════════════
// Price data via Claude web_search — no external stock API needed,
// no CORS issues, works from any browser on any host.

// fetchPrices: lightweight price check using Claude web_search
// Returns price + day change for a list of tickers.
// Results are cached in sessionStorage for 10 min to save API calls.
const PRICE_CACHE_KEY="ai_hub_price_cache";
function getPriceCache(){try{const c=JSON.parse(sessionStorage.getItem(PRICE_CACHE_KEY)||"{}");const now=Date.now();return Object.fromEntries(Object.entries(c).filter(([,v])=>now-v.ts<600000));}catch{return{};}}
function setPriceCache(data){try{const existing=getPriceCache();sessionStorage.setItem(PRICE_CACHE_KEY,JSON.stringify({...existing,...data}));}catch{}}

async function fetchPrices(tickers){
  const cache=getPriceCache();
  const needed=tickers.filter(t=>!cache[t]);
  const out={...Object.fromEntries(tickers.filter(t=>cache[t]).map(t=>[t,cache[t]]))};
  if(needed.length===0)return out;
  // Batch up to 8 tickers per Claude call to stay efficient
  const batches=[];
  for(let i=0;i<needed.length;i+=8)batches.push(needed.slice(i,i+8));
  await Promise.all(batches.map(async batch=>{
    try{
      const prompt=`Use web_search to find the current stock price and today's percentage change for these tickers: ${batch.join(", ")}. Return ONLY a JSON object like: {"NVDA":{"price":875.50,"pct":1.23},"AAPL":{"price":213.40,"pct":-0.45}}. Use the most recent market price available. No other text.`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getAK(),"anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01","anthropic-beta":"web-search-2025-03-05"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          system:"You are a financial data assistant. Return only valid JSON. No markdown fences, no explanation.",
          messages:[{role:"user",content:prompt}]})});
      const d=await r.json();
      if(d.error)throw new Error(d.error.message);
      const text=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
      const parsed=safeJSON(text);
      if(!parsed)throw new Error("parse");
      const toCache={};
      Object.entries(parsed).forEach(([t,v])=>{
        if(v&&v.price){
          out[t]={price:v.price,pct:v.pct||0,spark:[]};
          toCache[t]={price:v.price,pct:v.pct||0,spark:[],ts:Date.now()};
        }
      });
      setPriceCache(toCache);
    }catch{}
  }));
  return out;
}

  try{
    const prompt=`Use web_search to find current financial data for stock ticker ${ticker}. Search for "${ticker} stock price PE ratio revenue growth" and "${ticker} stock fundamentals beta 52 week". Return ONLY this JSON object with real current values (use null if not found):
{"name":"<company name>","price":<current price>,"change":<day change as decimal e.g. 0.012>,"pe":<trailing PE>,"fwdPe":<forward PE>,"peg":<PEG ratio>,"ps":<price to sales>,"revGrowth":<revenue growth as decimal e.g. 0.23>,"grossMargin":<gross margin as decimal>,"operatingMargin":<operating margin decimal>,"debtToEquity":<debt to equity ratio>,"targetPrice":<analyst consensus price target>,"beta":<beta>,"week52High":<52 week high>,"week52Low":<52 week low>,"recommendation":"buy|hold|sell|strongBuy|strongSell"}
No markdown. No extra text. Only the JSON.`;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getAK(),"anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01","anthropic-beta":"web-search-2025-03-05"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        system:"You are a financial data assistant. Use web search to find real, current stock data. Return only valid JSON. No markdown, no explanation.",
        messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    if(d.error){console.error("yahooFull API error:",d.error.message);return null;}
    const text=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
    const parsed=safeJSON(text);
    if(!parsed||!parsed.price)return null;
    return parsed;
  }catch{return null;}
}
async function claude(prompt,sys){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":getAK(),"anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:sys||"You are a sharp equity analyst specializing in AI stocks. Be concise and data-driven. No markdown, no asterisks.",
      messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}

async function claudeSearch(prompt,sys){
  // web_search_20250305 requires the anthropic-beta header
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":getAK(),
      "anthropic-dangerous-direct-browser-access":"true",
      "anthropic-version":"2023-06-01",
      "anthropic-beta":"web-search-2025-03-05"
    },
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      system:sys||"You are a financial analyst with web search access. Always search for current data, then return ONLY valid JSON. No markdown, no explanation outside the JSON.",
      messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  if(d.error){console.error("claudeSearch API error:",JSON.stringify(d.error));throw new Error(d.error.message||"API error");}
  // Collect all text blocks — web search may interleave tool_use and text blocks
  const text=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
  // If no text block yet (only tool_use blocks), the model is still searching
  // This shouldn't happen with max_tokens=2000 but guard against it
  if(!text&&d.stop_reason==="tool_use"){
    console.warn("claudeSearch: only tool_use blocks returned, no text. stop_reason:",d.stop_reason);
    throw new Error("Model did not return a text response. Try again.");
  }
  return text;
}

function safeJSON(raw){
  if(!raw)return null;
  let s=raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try{return JSON.parse(s);}catch{}
  const start=s.indexOf("{"),end=s.lastIndexOf("}");
  if(start!==-1&&end>start){try{return JSON.parse(s.slice(start,end+1));}catch{}}
  return null;
}
function fv(v,t){
  if(v==null||isNaN(v))return"—";
  if(t==="pct")return`${(v*100).toFixed(1)}%`;
  if(t==="$")return`$${v.toFixed(2)}`;
  if(t==="ratio")return v.toFixed(2);
  return v;
}

function RRBlock({price,beta,week52High,week52Low,targetPrice,fwdPe,revGrowth}){
  if(!price)return null;
  let score=50;
  const from52Low=week52Low?((price-week52Low)/week52Low)*100:null;
  const from52High=week52High?((week52High-price)/week52High)*100:null;
  const upToTarget=targetPrice?((targetPrice-price)/price)*100:null;
  if(from52Low!=null){if(from52Low<20)score+=10;else if(from52Low>80)score-=10;}
  if(from52High!=null){if(from52High>30)score+=8;else if(from52High<10)score-=8;}
  if(revGrowth!=null){if(revGrowth>0.20)score+=12;else if(revGrowth>0.10)score+=6;else if(revGrowth<0)score-=15;}
  if(fwdPe!=null){if(fwdPe<25)score+=8;else if(fwdPe>80)score-=10;}
  if(beta!=null){if(beta>2.5)score-=5;else if(beta<1)score+=5;}
  score=Math.max(10,Math.min(90,score));
  const bear=beta?`-${(price*(beta*0.12)).toFixed(0)}`:null;
  const base=upToTarget?`+${upToTarget.toFixed(1)}%`:null;
  const bull=upToTarget?`+${(upToTarget*1.4).toFixed(1)}%`:null;
  const rc=score>=65?C.gr:score>=45?C.go:C.re;
  return React.createElement("div",{style:{background:`${rc}08`,border:`1px solid ${rc}25`,borderRadius:8,padding:"9px 11px",marginTop:7}},

// ═══════════ KEY SETUP SCREEN ════════════════════════════
function KeySetup({onSave}){
  const [key,setKey]=useState("");
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState("");
  const save=async()=>{
    const k=key.trim();
    if(!k.startsWith("sk-ant-")){setErr("That doesn't look like an Anthropic key — it should start with sk-ant-");return;}
    setTesting(true);setErr("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"Hi"}]})});
      if(r.status===200||r.status===400){setAK(k);onSave();}
      else if(r.status===401){setErr("Invalid API key — double check you copied the full key from console.anthropic.com");}
      else{setErr(`Unexpected error (${r.status}) — try again`);}
    }catch(e){setErr("Connection failed — make sure you're on a real hosted URL (github.io), not a local file");}
    setTesting(false);
  };
  return React.createElement("div",{style:{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,padding:20}},
    React.createElement("div",{style:{maxWidth:340,width:"100%"}},
      React.createElement("div",{style:{fontSize:9,color:C.mu,letterSpacing:3,textTransform:"uppercase",marginBottom:8}},"ONE-TIME SETUP"),
      React.createElement("h2",{style:{fontFamily:"Georgia,serif",fontSize:20,color:C.ac,marginBottom:10,letterSpacing:-0.5}},"Connect Your Anthropic Key"),
      React.createElement("p",{style:{fontSize:12,color:C.di,lineHeight:1.7,marginBottom:18}},"The AI Scorer, Head-to-Head, and live prices all run on Claude. You need a free Anthropic API key — your key stays in your browser only, never sent anywhere else."),
      React.createElement("div",{style:{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:14,marginBottom:12}},
        React.createElement("div",{style:{fontSize:10,color:C.go,fontWeight:700,marginBottom:8}},"Step 1 — Get your key"),
        React.createElement("p",{style:{fontSize:11,color:C.di,lineHeight:1.6,margin:"0 0 8px"}},"Go to:"),
        React.createElement("div",{style:{background:C.bg,border:`1px solid ${C.ac}30`,borderRadius:6,padding:"7px 12px",fontSize:12,color:C.ac,textAlign:"center",marginBottom:8,letterSpacing:0.5}},"console.anthropic.com"),
        React.createElement("p",{style:{fontSize:11,color:C.di,lineHeight:1.6,margin:0}},"Sign in → API Keys → Create Key → Copy it.")
      ),
      React.createElement("div",{style:{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:14,marginBottom:14}},
        React.createElement("div",{style:{fontSize:10,color:C.go,fontWeight:700,marginBottom:8}},"Step 2 — Paste it here"),
        React.createElement(Inp,{value:key,onChange:setKey,placeholder:"sk-ant-api03-...",style:{width:"100%",boxSizing:"border-box",fontSize:11}}),
        err&&React.createElement("div",{style:{color:C.re,fontSize:10,marginTop:6,lineHeight:1.5}},err)
      ),
      React.createElement(Btn,{onClick:save,disabled:testing||!key.trim(),full:true,color:C.ac},testing?"Verifying…":"Save Key & Launch →"),
      React.createElement("p",{style:{fontSize:9,color:C.mu,textAlign:"center",marginTop:12,lineHeight:1.6}},"Key saved in your browser's local storage only. ~$0.01 per analysis. You control your own usage at console.anthropic.com")
    )
  );
}
