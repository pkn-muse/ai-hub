async function fetchPrices(tickers){
  const out={};
  await Promise.all(tickers.map(async t=>{
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=5d`,{headers:{Accept:"application/json"}});
      const j=await r.json();
      const m=j?.chart?.result?.[0]?.meta;
      if(m){
        const price=m.regularMarketPrice??m.previousClose;
        const prev=m.chartPreviousClose??m.previousClose;
        const pct=prev?(price-prev)/prev*100:0;
        const closes=j?.chart?.result?.[0]?.indicators?.quote?.[0]?.close??[];
        out[t]={price,pct,spark:closes.filter(Boolean).slice(-5)};
      }
    }catch{}
  }));
  return out;
}

function Spark({data,color}){
  if(!data||data.length<2)return null;
  const w=42,h=16,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${i/(data.length-1)*w},${h-(v-mn)/rng*h}`).join(" ");
  return React.createElement("svg",{width:w,height:h,style:{overflow:"visible",flexShrink:0}},
    React.createElement("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"1.5",strokeLinejoin:"round"}));
}

async function yahooFull(ticker){
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=price,summaryDetail,defaultKeyStatistics,financialData`,{headers:{Accept:"application/json"}});
    const j=await r.json();
    const res=j?.quoteSummary?.result?.[0];
    if(!res)return null;
    const p=res.price||{},sd=res.summaryDetail||{},ks=res.defaultKeyStatistics||{},fd=res.financialData||{};
    return{
      name:p.longName||p.shortName||ticker,price:p.regularMarketPrice?.raw,change:p.regularMarketChangePercent?.raw,mktCap:p.marketCap?.fmt,
      pe:ks.trailingEps?.raw&&p.regularMarketPrice?.raw?p.regularMarketPrice.raw/ks.trailingEps.raw:null,
      fwdPe:ks.forwardPE?.raw,peg:ks.pegRatio?.raw,ps:ks.priceToSalesTrailingTwelveMonths?.raw,
      revGrowth:fd.revenueGrowth?.raw,grossMargin:fd.grossMargins?.raw,operatingMargin:fd.operatingMargins?.raw,
      debtToEquity:fd.debtToEquity?.raw,targetPrice:fd.targetMeanPrice?.raw,recommendation:fd.recommendationKey,beta:sd.beta?.raw,
      week52High:sd.fiftyTwoWeekHigh?.raw,week52Low:sd.fiftyTwoWeekLow?.raw,
    };
  }catch{return null;}
}
async function callClaude(prompt,sys){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys||"You are a sharp equity analyst specializing in AI stocks. Be concise and data-driven. No markdown, no asterisks.",messages:[{role:"user",content:prompt}]})});
  const d=await r.json();return d.content?.[0]?.text||"No response";
}
function fmtV(val,type){
  if(val==null||isNaN(val))return"—";
  if(type==="pct")return`${(val*100).toFixed(1)}%`;
  if(type==="$")return`$${val.toFixed(2)}`;
  if(type==="ratio")return val.toFixed(2);
  return val;
}

function Toolkit(){

    React.createElement("div",{style:{display:"flex",gap:4,padding:"10px 0",borderBottom:`1px solid ${T.border}`,flexWrap:"wrap"}},
      tools.map(t=>React.createElement("button",{key:t.id,onClick:()=>setTool(t.id),style:{padding:"5px 11px",borderRadius:6,border:`1px solid ${tool===t.id?T.accent:T.border}`,background:tool===t.id?`${T.accent}15`:"transparent",color:tool===t.id?T.accent:T.muted,fontSize:10,cursor:"pointer"}},t.l))
